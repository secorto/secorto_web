name: E2E Tests (Playwright) on Workflow Dispatch
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to run tests against"
        required: true
        default: "https://secorto.com"
      folder:
        description: "Folder to run (optional)"
        required: false
        default: ""
      tag:
        description: "Tag to run (optional)"
        required: false
        default: ""
      real_third_party:
        description: "Run tests against real third-party services"
        required: false
        default: false
        type: boolean
jobs:
  e2e-tests:
    name: E2E Tests (Playwright)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      env:
        NETLIFY_PREVIEW_URL: ${{ env.NETLIFY_PREVIEW_URL }}
        BASE_URL: ${{ github.event.inputs.base_url }}
        FOLDER: ${{ github.event.inputs.folder }}
        TAG: ${{ github.event.inputs.tag }}
        REAL_THIRD_PARTY: ${{ github.event.inputs.real_third_party }}
      run: |
        if [ -n "$FOLDER" ] && [ -n "$TAG" ]; then
          npx playwright test "tests/$FOLDER" --grep "$TAG"
        elif [ -n "$FOLDER" ]; then
          npx playwright test "tests/$FOLDER"
        elif [ -n "$TAG" ]; then
          npx playwright test --grep "$TAG"
        else
          npx playwright test
        fi
    - uses: actions/upload-artifact@v6
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
