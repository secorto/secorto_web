name: Playwright E2E Tests on Netlify Deployments
on:
  repository_dispatch:
    # Este nombre de evento lo definiremos en el webhook de Netlify
    types: [netlify-deploy-success]

jobs:
  e2e-tests:
    # Only run if the deployment succeeded and it originates from Netlify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests against Netlify Preview
        env:
          # Inject the live Netlify preview URL into your Playwright configuration
          BASE_URL: ${{ github.event.client_payload.payload.links.permalink }}
        run: npx playwright test
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
